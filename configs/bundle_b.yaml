bundle:
  name: bundle_b
  title: "Bundle B - Destriping + MuLoG BM3D"
  readiness: serious_second_path
dataset:
  name: hrsid
  split: train
  sample_limit: 8
processing:
  additive:
    method: destripe_lowrank_sparse
    domain: log_intensity
    orientation: columns
    background_sigma: 9.0
    profile_sigma: 3.0
    correction_strength: 1.0
  multiplicative:
    method: mulog_bm3d
    domain: log_intensity
    backend_preference: bm3d
metrics:
  proxy_enl:
    patch_size: 32
  edge_sharpness:
    top_quantile: 0.9
  detection_proxy:
    threshold_quantile: 0.98
statistics:
  enabled: true
  dilation_radius: 4
  background_lower_quantile: 0.05
  background_upper_quantile: 0.5
  max_points_per_sample: 15000
downstream:
  primary_task: ship_detection_proxy
  secondary_task: sen1floods11_smoke_optional
  detector_status: proxy_only
outputs:
  root: results/bundle_b
