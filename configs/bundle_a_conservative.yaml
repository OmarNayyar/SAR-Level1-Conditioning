bundle:
  name: bundle_a_conservative
  title: "Bundle A Conservative - Mild Additive Cleanup + Light Refined Lee"
  readiness: detector_tuning_candidate
dataset:
  name: ssdd
  split: train
  sample_limit: 8
processing:
  additive:
    family: bundle_a_submethods
    submethod: auto
    fallback_submethod: A2
    domain: intensity
    require_metadata: false
    # Raise the artifact threshold so A3 is used only for stronger stripe cues.
    artifact_auto_threshold: 0.18
    image_floor:
      # Less aggressive than Bundle A's default 0.02 lower-tail subtraction.
      floor_quantile: 0.005
      quiet_upper_quantile: 0.20
    structured_artifact:
      domain: intensity
      orientation: columns
      background_sigma: 11.0
      profile_sigma: 4.0
      # Preserve ship-like edges by avoiding full stripe-profile subtraction.
      correction_strength: 0.35
  multiplicative:
    method: refined_lee
    domain: intensity
    # The current Refined Lee implementation is the 7x7 directional variant;
    # use blend strength, not window size, to make the detector candidate mild.
    window_size: 7
    strength: 0.35
metrics:
  proxy_enl:
    patch_size: 32
  edge_sharpness:
    top_quantile: 0.9
  detection_proxy:
    threshold_quantile: 0.98
statistics:
  enabled: true
  dilation_radius: 4
  background_lower_quantile: 0.05
  background_upper_quantile: 0.5
  max_points_per_sample: 15000
downstream:
  primary_task: ship_detection
  detector_status: tuning_candidate
outputs:
  root: results/bundle_a_conservative
  max_visual_samples: 6
  save_intermediate_arrays: false
