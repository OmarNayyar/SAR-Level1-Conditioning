dataset:
  name: ssdd
  # Use `none` for the full available split. This is intended for deliberate
  # long runs, ideally with a GPU.
  limit_per_split: none
  val_fraction: 0.2
variants:
  - raw
  - bundle_a_conservative
  - bundle_b
  - bundle_d
detector:
  backend: ultralytics
  model: yolov8n.pt
  epochs: 20
  imgsz: 640
  batch: 4
  workers: 0
  eval_split: test
  device: ""
outputs:
  root: outputs/downstream_detection_serious
