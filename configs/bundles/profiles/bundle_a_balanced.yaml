bundle:
  name: bundle_a
  title: "Bundle A Balanced - Additive Family + Refined Lee"
  readiness: screening_grade
profile:
  name: balanced
  purpose: "Default interpretable proxy-screening profile."
dataset:
  name: ssdd
  split: train
  sample_limit: 16
processing:
  additive:
    family: bundle_a_submethods
    submethod: auto
    fallback_submethod: A2
    domain: intensity
    require_metadata: false
    artifact_auto_threshold: 0.10
    image_floor:
      floor_quantile: 0.02
      quiet_upper_quantile: 0.25
    structured_artifact:
      domain: intensity
      orientation: columns
      background_sigma: 9.0
      profile_sigma: 3.0
      correction_strength: 1.0
  multiplicative:
    method: refined_lee
    domain: intensity
    window_size: 7
    strength: 1.0
outputs:
  root: outputs/profiles/bundle_a_balanced
  max_visual_samples: 6
  save_intermediate_arrays: false
