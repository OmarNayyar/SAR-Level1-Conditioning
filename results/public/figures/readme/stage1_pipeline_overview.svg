<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">SAR Stage-1 conditioning pipeline overview</title>
  <desc id="desc">Stage-0 focusing and calibration produce a raw SAR product. Stage-1 conditioning cleans noise and artifacts before downstream AI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#12313f"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.30"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#7dd3fc"/>
    </marker>
  </defs>
  <rect width="1200" height="430" rx="28" fill="url(#bg)"/>
  <text x="60" y="68" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">SAR Stage-1 Conditioning</text>
  <text x="60" y="104" fill="#bae6fd" font-family="Segoe UI, Arial, sans-serif" font-size="19">Between SAR product formation and downstream maritime AI</text>
  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <rect x="70" y="175" width="210" height="130" rx="22" fill="#1e293b" stroke="#64748b"/>
    <text x="175" y="215" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Stage-0</text>
    <text x="175" y="248" text-anchor="middle" fill="#cbd5e1" font-size="16">Focusing</text>
    <text x="175" y="275" text-anchor="middle" fill="#cbd5e1" font-size="16">Calibration</text>
    <rect x="360" y="150" width="235" height="180" rx="26" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="477" y="195" text-anchor="middle" fill="#f0f9ff" font-size="24" font-weight="700">Raw SAR Product</text>
    <text x="477" y="232" text-anchor="middle" fill="#bae6fd" font-size="16">SLC / amplitude</text>
    <text x="477" y="259" text-anchor="middle" fill="#bae6fd" font-size="16">intensity / log-domain</text>
    <text x="477" y="288" text-anchor="middle" fill="#e0f2fe" font-size="14">metadata when available</text>
    <rect x="680" y="130" width="250" height="220" rx="30" fill="#134e4a" stroke="#5eead4" stroke-width="2"/>
    <text x="805" y="176" text-anchor="middle" fill="#ecfeff" font-size="24" font-weight="700">Stage-1 Conditioning</text>
    <text x="805" y="215" text-anchor="middle" fill="#ccfbf1" font-size="16">thermal/noise-floor cleanup</text>
    <text x="805" y="244" text-anchor="middle" fill="#ccfbf1" font-size="16">destriping/artifact reduction</text>
    <text x="805" y="273" text-anchor="middle" fill="#ccfbf1" font-size="16">speckle-aware filtering</text>
    <text x="805" y="302" text-anchor="middle" fill="#ccfbf1" font-size="16">candidate route screening</text>
    <rect x="1000" y="175" width="145" height="130" rx="22" fill="#3b0764" stroke="#c084fc"/>
    <text x="1072" y="214" text-anchor="middle" fill="#faf5ff" font-size="21" font-weight="700">Downstream</text>
    <text x="1072" y="247" text-anchor="middle" fill="#e9d5ff" font-size="15">detectors</text>
    <text x="1072" y="273" text-anchor="middle" fill="#e9d5ff" font-size="15">segmenters</text>
  </g>
  <path d="M 290 240 L 342 240" stroke="#7dd3fc" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 605 240 L 662 240" stroke="#7dd3fc" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M 940 240 L 982 240" stroke="#7dd3fc" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="805" y="386" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="17">Goal: make conditioning decisions measurable, not assumed.</text>
</svg>
